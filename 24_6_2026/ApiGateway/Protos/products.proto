syntax = "proto3";

option csharp_namespace = "ProductCatalog.Contracts";

package productcatalog;

service ProductCatalog {
  rpc GetProducts (EmptyRequest) returns (ProductListReply);
  rpc GetProduct (ProductByIdRequest) returns (ProductReply);
}

message EmptyRequest {
}

message ProductByIdRequest {
  int32 id = 1;
}

message ProductReply {
  int32 id = 1;
  string name = 2;
  double price = 3;
  int32 stock = 4;
}

message ProductListReply {
  repeated ProductReply products = 1;
}
